<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorit Saya — ArtLocal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Art<span>Local</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Galeri</a></li>
      <li><a href="artists.html">Seniman</a></li>
      <li><a href="favorites.html">Favorit</a></li>
      <li><a href="commission.html">Komisi</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-icon" id="themeBtn" title="Ganti tema"></button>
      <a href="favorites.html" class="btn-icon" title="Favorit saya">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>
      </a>
    </div>
  </nav>

  <main>
    <div class="container">
      <section class="hero">
        <p class="hero-eyebrow">✦ Koleksi Saya</p>
        <h1 class="hero-title">Karya <em>favorit</em><br>pilihanmu</h1>
        <p class="hero-sub" id="favSubtitle">Karya yang kamu simpan tersimpan di sini. Data disimpan di browser-mu.</p>
      </section>

      <div class="gallery-grid" id="favGrid" style="margin-top:40px">
        <div class="loading">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;width:100%">
      <span class="footer-logo">Art<span>Local</span></span>
      <span class="footer-text">Dibuat dengan sepenuh hati dari kelompok 2 untuk komunitas seni lokal Indonesia</span>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script>
    async function init() {
      const favIds = LS.getFavorites();
      const [artworks, artists] = await Promise.all([fetchArtworks(), fetchArtists()]);
      const favWorks = artworks.filter(w => favIds.includes(w.id));

      document.getElementById('favSubtitle').textContent =
        favWorks.length > 0
          ? `${favWorks.length} karya tersimpan. Data disimpan di browser-mu.`
          : 'Belum ada karya yang disimpan. Jelajahi galeri dan tekan 🤍 untuk menyimpan!';

      const grid = document.getElementById('favGrid');
      if (favWorks.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">💛</div>
            <h3>Koleksimu masih kosong</h3>
            <p>Temukan karya yang kamu suka di galeri dan simpan ke sini.</p>
            <br>
            <a href="index.html" class="btn-primary" style="display:inline-block;padding:12px 28px">Jelajahi Galeri →</a>
          </div>`;
        return;
      }

      grid.innerHTML = favWorks.map(w => {
        const artist = artists.find(a => a.id === w.artistId);
        return renderArtworkCard(w, artist);
      }).join('');
    }
    init();
  </script>
</body>
</html>
