<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seniman | ArtLocal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">Art<span>Local</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Galeri</a></li>
      <li><a href="artists.html">Seniman</a></li>
      <li><a href="favorites.html">Favorit</a></li>
      <li><a href="commission.html">Komisi</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-icon" id="themeBtn" title="Ganti tema"></button>
      <a href="favorites.html" class="btn-icon" title="Favorit saya">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"/></svg>
      </a>
    </div>
  </nav>

  <main>
    <div class="container">
      <section class="hero">
        <p class="hero-eyebrow">✦ Komunitas</p>
        <h1 class="hero-title">Para <em>seniman</em><br>lokal kami</h1>
        <p class="hero-sub">Kenali talenta-talenta luar biasa di balik setiap karya yang kamu lihat di ArtLocal.</p>
      </section>

      <div class="artists-grid" id="artistsGrid" style="padding-top:40px; padding-bottom:60px">
        <div class="loading">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;width:100%">
      <span class="footer-logo">Art<span>Local</span></span>
      <span class="footer-text">Dibuat dengan sepenuh hati dari kelompok 2 untuk komunitas seni lokal Indonesia</span>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script>
    async function init() {
      const artists = await fetchArtists();
      const artworks = await fetchArtworks();
      const grid = document.getElementById('artistsGrid');
      grid.innerHTML = artists.map(a => {
        const count = artworks.filter(w => w.artistId === a.id).length;
        return `
          <div class="artist-card" onclick="location.href='artist.html?id=${a.id}'">
            <img src="${a.avatar}" alt="${a.name}" class="artist-avatar">
            <div class="artist-card-name">${a.name}</div>
            <div class="artist-card-city">📍 ${a.city}</div>
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">${count} karya</div>
            <div class="artist-card-cats">
              ${a.categories.map(c => `<span class="tag">${c}</span>`).join('')}
            </div>
          </div>`;
      }).join('');
    }
    init();
  </script>
</body>
</html>
